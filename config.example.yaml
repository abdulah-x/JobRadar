schedule:
  remote_minutes: 30    # WeWorkRemotely, RemoteOK, Remote.co, Remotive
  jobspy_hours: 3       # Indeed (via JobSpy)

filters:
  keywords:
    # Core AI/ML titles
    - AI engineer
    - ML engineer
    - machine learning engineer
    - machine learning
    - deep learning
    - MLOps
    - data scientist
    - data engineer
    - data science
    - LLM
    - large language model
    - generative AI
    - NLP
    - natural language processing
    - computer vision
    - PyTorch
    - TensorFlow
    - model serving
    - vector database
    - AI researcher
    - applied scientist
    - AI scientist
    # AI/ML techniques — catch roles titled by method, not "AI/ML"
    - RAG
    - fine-tuning
    - fine tuning
    - Hugging Face
    - transformer
    - reinforcement learning
    - recommendation system
    - recommender
    - diffusion model
    - multimodal
    - foundation model
    - inference engineer
    - embedding
    # Data engineering — often overlaps with ML pipelines
    - analytics engineer
    - data pipeline
    - ETL
    - Spark
    - dbt
    - Kafka
    # Software roles common in AI product companies on remote boards
    - Python engineer
    - Python developer
    - research engineer
    - backend engineer
    - software engineer
    # Entry-level role titles
    - entry level analyst
    - trainee
    - associate analyst
    - junior specialist
    - coordinator
    - intern to hire
    - graduate program
    - management trainee
    - apprenticeship
    - rotational program
    # Entry-level search phrases
    - "entry level"
    - "fresh graduate"
    - "graduate trainee"
    - "no experience required"
    - "new grad"
    - "campus hire"
    - junior
    - associate
  exclude_keywords:
    - 10+ years
    - 7+ years
    - 5+ years
    - principal engineer
    - "VP of"
    - staff engineer
    - director
    - senior engineer
    - lead engineer
    - "senior Python"
    - "senior backend"
    - "senior software"
    - "senior research"
    - "senior analytics"
    - "lead Python"
    - "lead backend"
    - "lead software"
  # Accepted locations for on-site roles. Remote jobs are also accepted if they
  # don't require work authorization outside your country.
  locations:
    - Lahore
    - Islamabad
  # Salary minimums — jobs that specify a salary below these are skipped.
  # Jobs with no salary info get benefit of the doubt (salary_ok = true).
  salary:
    min_pkr: 75000     # adjust or remove if you're not in Pakistan
    min_usd: 600
  # Only these seniority levels will be notified.
  seniority_allowed:
    - entry
    - associate
    - intern

# Optional: index your public GitHub repos into the resume vector store
# so the AI considers your projects when scoring jobs.
github:
  username: "YOUR_GITHUB_USERNAME"   # e.g. "johndoe" — leave blank to disable
  token: ""           # optional PAT for higher rate limits (5000 req/hr vs 60)
  max_repos: 20       # fetch this many most-recently-updated public repos
  include_readme: true

scoring:
  semantic_threshold: 0.60    # Stage 1 cutoff — jobs below this skip LLM scoring
  llm_threshold: 80           # Stage 2 cutoff — jobs below this are not emailed
  daily_job_limit: 20         # max jobs emailed per calendar day
  gemini_api_key: "YOUR_GEMINI_API_KEY"
  groq_api_key: "YOUR_GROQ_API_KEY"   # optional fallback when Gemini hits rate limits

email:
  sender: "your.email@gmail.com"
  app_password: "xxxx xxxx xxxx xxxx"   # Gmail App Password (not your main password)
  recipient: "your.email@gmail.com"     # where to receive job digests

sources:
  jobspy:
    enabled: true
    sites:
      - indeed
    results_per_site: 30
    locations:
      - "Lahore, Pakistan"
      - "Islamabad, Pakistan"
      - "Remote"
  weworkremotely:
    enabled: true
  remoteok:
    enabled: true
  remoteco:
    enabled: true
  remotive:
    enabled: true
    categories:
      - software-dev
      - data
    limit_per_category: 50
  workatastartup:
    enabled: true
